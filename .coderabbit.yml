---
language: en-US
tone_instructions: ""
early_access: false
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: false
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: true
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: true
  labeling_instructions: []
  path_filters: []
  path_instructions:
    - path: "agents/.agents/skills/**/SKILL.md"
      instructions: |
        These files are Codex skill instructions. Focus on accidental disclosure
        of private context, credentials, internal-only paths, or personal data;
        prompt clarity; scope control; and whether the skill asks agents to use
        safe, reviewable workflows.
    - path: "agents/.agents/skills/**/agents/*.{yaml,yml}"
      instructions: |
        These files expose skills to agent surfaces. Verify the YAML remains
        minimal, parseable, non-secret, and aligned with the corresponding
        skill instructions.
    - path: "agents/.agents/skills/**/scripts/*.py"
      instructions: |
        These are Python support scripts for reusable Codex skills. Focus on
        parser correctness, deterministic output, explicit error handling,
        subprocess discipline, fixture-backed tests, and compatibility with the
        repository Ruff and ty configuration.
    - path: "bin/*.sh"
      instructions: |
        These scripts bootstrap and verify a personal macOS dotfiles
        environment. Review for idempotence, shell quoting, safe filesystem
        behavior, and package-manager boundary mistakes.
    - path: ".github/workflows/*.{yaml,yml}"
      instructions: |
        Audit GitHub Actions for pinned actions, least-privilege permissions,
        shell injection risks, credential persistence, and unnecessary network
        or write access.
    - path: "semgrep.yaml"
      instructions: |
        Keep repository-owned Semgrep rules focused and low-noise. Prefer rules
        that encode dotfiles-specific policy, local CI guardrails, or reviewed
        bootstrap invariants, and require fixture coverage under tests/semgrep
        for new rules.
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: true
    base_branches: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 100
    title:
      mode: warning
      requirements: ""
    description:
      mode: warning
    issue_assessment:
      mode: warning
  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
      level: default
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    ruff:
      enabled: true

    ast-grep:
      enabled: false
    biome:
      enabled: false
    brakeman:
      enabled: false
    buf:
      enabled: false
    checkmake:
      enabled: false
    checkov:
      enabled: false
    circleci:
      enabled: false
    clippy:
      enabled: false
    cppcheck:
      enabled: false
    detekt:
      enabled: false
    dotenvLint:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    golangci-lint:
      enabled: false
    hadolint:
      enabled: false
    htmlhint:
      enabled: false
    luacheck:
      enabled: false
    oxc:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    phpstan:
      enabled: false
    pmd:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    regal:
      enabled: false
    rubocop:
      enabled: false
    semgrep:
      enabled: true
      config_file: semgrep.yaml
    shopifyThemeCheck:
      enabled: false
    sqlfluff:
      enabled: false
    swiftlint:
      enabled: false

chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: auto

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "agents/.agents/skills/**"
      - "bin/**"
      - ".github/workflows/**"
      - "git/.gitconfig"
      - "pyproject.toml"
      - "justfile"
      - "semgrep.yaml"
      - "scripts/**"
      - "tests/semgrep/**"
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    usage: auto
    project_keys: []
  linear:
    usage: auto
    team_keys: []
  pull_requests:
    scope: auto

code_generation:
  docstrings:
    language: en-US
    path_instructions: []
  unit_tests:
    path_instructions: []
