model = "gpt-5.5"
model_reasoning_effort = "high"
service_tier = "default"
developer_instructions = """
When the user sends a message while Codex is already working, treat the newest
message as steering for the active turn. If it conflicts with earlier
instructions, let the newest message win. If it is additive, incorporate it and
continue without waiting unless the user explicitly asks Codex to pause, stop,
or only report status.
"""

sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true
writable_roots = [ "/Users/adam/.cache/codex/uv" ]

[shell_environment_policy]
set = { UV_CACHE_DIR = "/Users/adam/.cache/codex/uv" }

[features]
js_repl = false

[desktop]
followUpQueueMode = "steer"

[desktop.open-in-target-preferences]
global = "zed"
